<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cubic Calculator</title>
  </head>

  <body>
    <script type="module" src="/src/main.ts"></script>
    <h1 class="header">Cubic Calculator</h1>
    <div class="container">
      <form id="cubic-form">
        <label for="a">A:</label>
        <input type="text" id="a" name="a" required />
        <label for="b">B:</label>
        <input type="text" id="b" name="b" required />
        <label for="c">C:</label>
        <input type="text" id="c" name="c" required />
        <label for="d">D:</label>
        <input type="text" id="d" name="d" required />
        <button type="submit">Evaluate</button>
      </form>
    </div>
    <div>
      <h1 id="equation"></h1>
    </div>
    <div class="output-container">
      <table>
        <tr>
          <th>p</th>
          <td id="p-value" colspan="2"></td>
        </tr>
        <tr>
          <th>q</th>
          <td id="q-value" colspan="2"></td>
        </tr>
        <tr>
          <th>Discriminant</th>
          <td id="discriminant" colspan="2"></td>
        </tr>
        <tr>
          <th>Value</th>
          <td>x</td>
          <td>y</td>
        </tr>

        <tr>
          <th>Root 1</th>
          <td id="root1"></td>
          <td id="y1"></td>
        </tr>
        <tr>
          <th>Root 2</th>
          <td id="root2"></td>
          <td id="y2"></td>
        </tr>
        <tr>
          <th>Root 3</th>
          <td id="root3"></td>
          <td id="y3"></td>
        </tr>
      </table>
      <canvas id="graph" width="600" height="600"></canvas>
    </div>
  </body>
</html>
